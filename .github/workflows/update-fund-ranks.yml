name: 更新全市场基金排名数据

on:
  schedule:
    # 每周一、四 UTC 02:17 = 北京时间 10:17
    # 注意：GitHub Actions schedule 在整点（尤其 UTC 00/01 点）高峰期容易被延迟或跳过，
    # 故选择非整点时段。实际执行可能仍有数分钟到 1 小时左右的延迟。
    - cron: '17 2 * * 1,4'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-ranks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 拉取基金排名数据
        run: node scripts/fetch-ranks.js

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market-ranks.json data/curated-details.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "data: 自动更新全市场基金排名数据 $(date +%Y-%m-%d)"
            git push
          fi
