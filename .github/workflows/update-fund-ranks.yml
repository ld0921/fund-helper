name: 更新全市场基金排名数据

on:
  schedule:
    # 每周一、四 UTC 02:17 = 北京时间 10:17
    # 注意：GitHub Actions schedule 在整点（尤其 UTC 00/01 点）高峰期容易被延迟或跳过，
    # 故选择非整点时段。实际执行可能仍有数分钟到 1 小时左右的延迟。
    - cron: '17 2 * * 1,4'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-ranks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 更新股票→行业映射表（如不存在或超过30天）
        continue-on-error: true
        run: |
          MAP_FILE="data/stock-industry-map.json"
          NEED_UPDATE=true
          if [ -f "$MAP_FILE" ]; then
            # 文件存在且修改时间在30天内则跳过
            if [ $(find "$MAP_FILE" -mtime -30 | wc -l) -gt 0 ]; then
              NEED_UPDATE=false
              echo "股票行业映射表存在且未过期，跳过更新"
            fi
          fi
          if [ "$NEED_UPDATE" = "true" ]; then
            echo "更新股票→行业映射表..."
            node scripts/update-industry-map.js || echo "⚠️ 映射表更新失败（数据源限流），跳过；主动基金行业归因暂时不可用"
          fi

      - name: 更新概念板块→股票映射（如不存在或超过30天）
        continue-on-error: true
        run: |
          MAP_FILE="data/stock-concept-map.json"
          NEED_UPDATE=true
          if [ -f "$MAP_FILE" ]; then
            if [ $(find "$MAP_FILE" -mtime -30 | wc -l) -gt 0 ]; then
              NEED_UPDATE=false
              echo "概念映射表存在且未过期，跳过"
            fi
          fi
          if [ "$NEED_UPDATE" = "true" ]; then
            echo "更新概念板块映射..."
            node scripts/fetch-concepts.js || echo "⚠️ 概念映射更新失败，跳过"
          fi

      - name: 更新联接基金→ETF本体映射（如不存在或超过30天）
        continue-on-error: true
        run: |
          MAP_FILE="data/feeder-etf-map.json"
          NEED_UPDATE=true
          if [ -f "$MAP_FILE" ]; then
            if [ $(find "$MAP_FILE" -mtime -30 | wc -l) -gt 0 ]; then
              NEED_UPDATE=false
              echo "ETF映射表存在且未过期，跳过"
            fi
          fi
          if [ "$NEED_UPDATE" = "true" ]; then
            echo "更新联接基金→ETF映射..."
            node scripts/fetch-etf-map.js || echo "⚠️ ETF映射更新失败，跳过"
          fi

      - name: 更新ETF本体持仓数据（如不存在或超过30天）
        continue-on-error: true
        run: |
          MAP_FILE="data/etf-holdings.json"
          NEED_UPDATE=true
          if [ -f "$MAP_FILE" ]; then
            if [ $(find "$MAP_FILE" -mtime -30 | wc -l) -gt 0 ]; then
              NEED_UPDATE=false
              echo "ETF持仓数据存在且未过期，跳过"
            fi
          fi
          if [ "$NEED_UPDATE" = "true" ]; then
            if [ -f "data/feeder-etf-map.json" ]; then
              echo "更新ETF本体持仓..."
              node scripts/fetch-etf-holdings.js || echo "⚠️ ETF持仓更新失败，跳过"
            else
              echo "feeder-etf-map.json 不存在，跳过"
            fi
          fi

      - name: 拉取基金排名数据
        run: node scripts/fetch-ranks.js

      - name: 重推基金板块/概念标签
        continue-on-error: true
        run: node scripts/reinfer-sectors.js

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market-ranks.json data/curated-details.json data/stock-industry-map.json data/stock-concept-map.json data/feeder-etf-map.json data/etf-holdings.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "data: 自动更新全市场基金排名数据 $(date +%Y-%m-%d)"
            git push
          fi
